name: admin_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  riverpod_annotation: ^3.0.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  json_annotation: any
  freezed_annotation: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^3.0.0
  build_runner: ^2.4.0
  custom_lint: 0.8.0
  riverpod_lint: ^3.0.0
  json_serializable: any
  freezed: any

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
